<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Job posting form -->
  <g transform="translate(60, 50)">
    <!-- Document/Form -->
    <rect x="10" y="0" width="50" height="70" rx="2" fill="none" stroke="#22c55e" stroke-width="2"/>
    
    <!-- Title line -->
    <line x1="15" y1="10" x2="55" y2="10" stroke="#22c55e" stroke-width="1.5"/>
    
    <!-- Content lines -->
    <line x1="15" y1="20" x2="55" y2="20" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="27" x2="45" y2="27" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="34" x2="55" y2="34" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="41" x2="50" y2="41" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="48" x2="55" y2="48" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="55" x2="45" y2="55" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    
    <!-- Checkmark -->
    <g transform="translate(45, 35)">
      <circle cx="0" cy="0" r="8" fill="#22c55e" opacity="0.1"/>
      <path d="M -4 0 L -1 3 L 4 -2" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Send/Arrow icon -->
  <g transform="translate(110, 85)">
    <path d="M 0 0 L 20 10 L 0 20 L 5 10 Z" fill="#22c55e" opacity="0.8"/>
    <line x1="25" y1="10" x2="45" y2="10" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Briefcase icon -->
  <g transform="translate(70, 110)">
    <rect x="5" y="10" width="30" height="20" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M 15 10 L 15 5 Q 15 3 17 3 L 23 3 Q 25 3 25 5 L 25 10" stroke="#22c55e" stroke-width="1.5" fill="none"/>
    <circle cx="12" cy="20" r="1" fill="#22c55e"/>
    <circle cx="28" cy="20" r="1" fill="#22c55e"/>
  </g>
</svg>