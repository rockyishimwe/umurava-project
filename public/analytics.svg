<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Dashboard/Analytics chart -->
  <g transform="translate(50, 50)">
    <!-- Chart frame -->
    <rect x="0" y="5" width="70" height="50" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    
    <!-- Axes -->
    <line x1="0" y1="55" x2="70" y2="55" stroke="#22c55e" stroke-width="1.5"/>
    <line x1="0" y1="5" x2="0" y2="55" stroke="#22c55e" stroke-width="1.5"/>
    
    <!-- Bar chart bars -->
    <rect x="8" y="35" width="8" height="20" rx="1" fill="#22c55e" opacity="0.6"/>
    <rect x="20" y="25" width="8" height="30" rx="1" fill="#22c55e" opacity="0.8"/>
    <rect x="32" y="20" width="8" height="35" rx="1" fill="#22c55e"/>
    <rect x="44" y="28" width="8" height="27" rx="1" fill="#22c55e" opacity="0.7"/>
    <rect x="56" y="15" width="8" height="40" rx="1" fill="#22c55e" opacity="0.9"/>
    
    <!-- Trend line -->
    <path d="M 5 45 L 15 35 L 25 28 L 35 20 L 45 25 L 55 18 L 65 12" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  </g>
  
  <!-- Pie chart -->
  <g transform="translate(110, 80)">
    <!-- Circle background -->
    <circle cx="15" cy="15" r="12" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.2"/>
    
    <!-- Pie segments -->
    <path d="M 15 3 A 12 12 0 0 1 24 6" fill="none" stroke="#22c55e" stroke-width="3"/>
    <path d="M 24 6 A 12 12 0 0 1 20 26" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.6"/>
    <path d="M 20 26 A 12 12 0 0 1 15 3" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.3"/>
  </g>
  
  <!-- Growth arrow indicator -->
  <g transform="translate(75, 120)">
    <path d="M 0 15 L 0 0 M 0 0 L -5 5 M 0 0 L 5 5" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="8" y="18" font-size="12" fill="#22c55e" font-weight="bold">+32%</text>
  </g>
</svg>