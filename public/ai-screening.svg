<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Brain icon with gradient effect -->
  <g transform="translate(70, 60)">
    <!-- Left hemisphere -->
    <path d="M20 15 Q15 10 15 5 Q15 0 20 0 Q25 0 25 5 L25 20 Q20 22 15 20 Z" fill="#22c55e" opacity="0.8"/>
    
    <!-- Right hemisphere -->
    <path d="M40 15 Q45 10 45 5 Q45 0 40 0 Q35 0 35 5 L35 20 Q40 22 45 20 Z" fill="#22c55e" opacity="0.6"/>
    
    <!-- Connection lines -->
    <line x1="25" y1="20" x2="35" y2="20" stroke="#22c55e" stroke-width="2"/>
    <line x1="20" y1="25" x2="40" y2="25" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Neural nodes -->
    <circle cx="15" cy="35" r="2" fill="#22c55e"/>
    <circle cx="30" cy="40" r="2" fill="#22c55e"/>
    <circle cx="45" cy="35" r="2" fill="#22c55e"/>
    <circle cx="25" cy="50" r="2" fill="#22c55e"/>
    <circle cx="40" cy="50" r="2" fill="#22c55e"/>
  </g>
  
  <!-- Document/Checkmark icon -->
  <g transform="translate(100, 100)">
    <rect x="-15" y="-15" width="30" height="30" rx="3" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M -8 -5 L -2 2 L 8 -8" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Sparkles for AI effect -->
  <g transform="translate(130, 75)">
    <circle cx="0" cy="0" r="1.5" fill="#22c55e" opacity="0.6"/>
    <circle cx="-8" cy="-8" r="1" fill="#22c55e" opacity="0.4"/>
    <circle cx="8" cy="8" r="1" fill="#22c55e" opacity="0.4"/>
  </g>
</svg>