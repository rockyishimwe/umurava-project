<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Multiple candidate profiles -->
  <g>
    <!-- First candidate card -->
    <g transform="translate(45, 55)">
      <rect x="0" y="0" width="35" height="45" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
      <circle cx="17.5" cy="12" r="5" fill="#22c55e" opacity="0.6"/>
      <line x1="5" y1="20" x2="30" y2="20" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
      <line x1="5" y1="25" x2="30" y2="25" stroke="#22c55e" stroke-width="0.8" opacity="0.4"/>
      <line x1="5" y1="30" x2="25" y2="30" stroke="#22c55e" stroke-width="0.8" opacity="0.4"/>
      <!-- Check mark -->
      <circle cx="27" cy="38" r="4" fill="#22c55e" opacity="0.8"/>
      <path d="M 24 38 L 26 40 L 30 36" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Second candidate card (overlapped) -->
    <g transform="translate(65, 45)">
      <rect x="0" y="0" width="35" height="45" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
      <circle cx="17.5" cy="12" r="5" fill="#22c55e" opacity="0.5"/>
      <line x1="5" y1="20" x2="30" y2="20" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
      <line x1="5" y1="25" x2="30" y2="25" stroke="#22c55e" stroke-width="0.8" opacity="0.3"/>
      <line x1="5" y1="30" x2="25" y2="30" stroke="#22c55e" stroke-width="0.8" opacity="0.3"/>
      <!-- Check mark -->
      <circle cx="27" cy="38" r="4" fill="#22c55e" opacity="0.6"/>
      <path d="M 24 38 L 26 40 L 30 36" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Third candidate card -->
    <g transform="translate(85, 60)">
      <rect x="0" y="0" width="35" height="45" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
      <circle cx="17.5" cy="12" r="5" fill="#22c55e" opacity="0.4"/>
      <line x1="5" y1="20" x2="30" y2="20" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Screening indicator -->
  <g transform="translate(60, 120)">
    <circle cx="15" cy="10" r="10" fill="none" stroke="#22c55e" stroke-width="2"/>
    <path d="M 8 10 A 7 7 0 1 1 22 10" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="0" y="30" font-size="14" fill="#22c55e" font-weight="bold" text-anchor="middle">Screening</text>
  </g>
</svg>